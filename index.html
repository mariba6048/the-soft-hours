<style>
  :root {
    --cream: #f4f7f2;
    --parchment: #e4ede0;
    --warm-tan: #c2d4bc;
    --sienna: #5a8a5a;
    --rust: #4e7d4e;
    --brown: #3a5e3a;
    --dark-brown: #1e3a1e;
    --ink: #1a2e1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #7a9a7a;
    background-image:
      radial-gradient(ellipse at 20% 20%, #8fac8a 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, #6b8f6b 0%, transparent 50%);
    min-height: 100vh;
    font-family: 'Noto Serif TC', serif;
    color: var(--ink);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 20px 60px;
  }

  .journal {
    width: 100%;
    max-width: 700px;
    background: var(--cream);
    border-radius: 4px 16px 16px 4px;
    box-shadow:
      -8px 0 0 var(--sienna),
      -12px 0 0 var(--brown),
      0 20px 60px rgba(30,58,30,0.4),
      0 4px 15px rgba(30,58,30,0.3);
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.8s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .journal::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 31px,
      rgba(90,138,90,0.08) 31px, rgba(90,138,90,0.08) 32px
    );
    pointer-events: none;
    z-index: 0;
  }

  .journal::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0; left: 72px;
    width: 1px;
    background: rgba(90,138,90,0.2);
    pointer-events: none;
    z-index: 1;
  }

  .journal-content {
    position: relative;
    z-index: 2;
    padding: 48px 48px 48px 90px;
  }

  /* HEADER */
  .journal-header {
    text-align: center;
    margin-bottom: 36px;
    padding-bottom: 24px;
    border-bottom: 1.5px solid var(--warm-tan);
  }

  .journal-header .subtitle {
    font-style: italic;
    font-size: 0.8rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--sienna);
    margin-bottom: 8px;
  }

  .journal-header h1 {
    font-size: 2.8rem;
    font-weight: 400;
    color: var(--dark-brown);
    line-height: 1.1;
  }

  .date-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-top: 18px;
  }

  .date-field {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
    color: var(--brown);
  }

  .date-field label { font-style: italic; }

  .date-field input[type="date"] {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--warm-tan);
    font-family: 'Noto Serif TC', serif;
    font-size: 0.85rem;
    color: var(--ink);
    padding: 2px 4px;
    outline: none;
  }

  /* WEATHER */
  .weather-field {
    flex-direction: column;
    align-items: flex-start !important;
    gap: 8px !important;
  }

  .weather-options {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .weather-btn {
    background: transparent;
    border: 1.5px solid var(--warm-tan);
    border-radius: 30px;
    padding: 5px 12px;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.78rem;
    color: var(--brown);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .weather-btn:hover {
    border-color: var(--sienna);
    background: var(--parchment);
  }

  .weather-btn.active {
    background: var(--sienna);
    border-color: var(--sienna);
    color: var(--cream);
    box-shadow: 0 2px 8px rgba(90,138,90,0.3);
  }

  /* SECTION */
  .section { margin-bottom: 36px; }

  .section-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--sienna);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--warm-tan);
  }

  /* MOOD */
  .mood-tracker {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .mood-btn {
    background: transparent;
    border: 1.5px solid var(--warm-tan);
    border-radius: 40px;
    padding: 8px 16px;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.85rem;
    color: var(--brown);
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .mood-btn:hover {
    border-color: var(--sienna);
    background: var(--parchment);
    transform: translateY(-1px);
  }

  .mood-btn.active {
    background: var(--sienna);
    border-color: var(--sienna);
    color: var(--cream);
    box-shadow: 0 2px 8px rgba(90,138,90,0.3);
  }

  textarea.mood-note {
    margin-top: 12px;
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--warm-tan);
    font-family: 'Noto Serif TC', serif;
    font-size: 0.875rem;
    color: var(--ink);
    padding: 6px 2px;
    outline: none;
    resize: none;
  }

  textarea.mood-note::placeholder { color: var(--warm-tan); font-style: italic; }

  /* WRITING */
  textarea.writing-area {
    width: 100%;
    min-height: 200px;
    background: transparent;
    border: none;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.95rem;
    line-height: 2rem;
    color: var(--ink);
    resize: vertical;
    outline: none;
    padding: 0;
  }

  textarea.writing-area::placeholder { color: var(--warm-tan); font-style: italic; }

  /* GRATITUDE */
  .gratitude-list { display: flex; flex-direction: column; gap: 12px; }

  .gratitude-item { display: flex; align-items: center; gap: 12px; }

  .gratitude-num {
    font-style: italic;
    font-size: 1.2rem;
    color: var(--sienna);
    min-width: 20px;
  }

  .gratitude-item input {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--warm-tan);
    font-family: 'Noto Serif TC', serif;
    font-size: 0.9rem;
    color: var(--ink);
    padding: 4px 2px;
    outline: none;
    transition: border-color 0.2s;
  }

  .gratitude-item input:focus { border-bottom-color: var(--sienna); }
  .gratitude-item input::placeholder { color: var(--warm-tan); font-style: italic; }

  /* PHOTOS */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .photo-slot {
    aspect-ratio: 1;
    border: 1.5px dashed var(--warm-tan);
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: var(--parchment);
    overflow: hidden;
    position: relative;
    transition: border-color 0.2s, background 0.2s;
  }

  .photo-slot:hover { border-color: var(--sienna); background: var(--warm-tan); }
  .photo-slot .placeholder-icon { font-size: 1.8rem; margin-bottom: 4px; opacity: 0.5; }
  .photo-slot .placeholder-text { font-size: 0.7rem; color: var(--sienna); font-style: italic; opacity: 0.8; }
  .photo-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
  .photo-slot input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

  .photo-caption-area { margin-top: 10px; }
  .photo-caption-area input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--warm-tan);
    font-family: 'Noto Serif TC', serif;
    font-style: italic;
    font-size: 0.8rem;
    color: var(--brown);
    padding: 4px 2px;
    outline: none;
  }
  .photo-caption-area input::placeholder { color: var(--warm-tan); }

  /* FOOTER */
  .journal-footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1.5px solid var(--warm-tan);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .save-btn {
    background: var(--sienna);
    color: var(--cream);
    border: none;
    padding: 10px 28px;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 2px 10px rgba(90,138,90,0.3);
  }

  .save-btn:hover { background: var(--rust); transform: translateY(-1px); }
  .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .page-num {
    font-style: italic;
    font-size: 0.85rem;
    color: var(--warm-tan);
  }

  .clear-btn {
    background: transparent;
    border: 1px solid var(--warm-tan);
    color: var(--brown);
    padding: 10px 20px;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.8rem;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .clear-btn:hover { border-color: var(--sienna); color: var(--sienna); }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--dark-brown);
    color: var(--cream);
    padding: 12px 24px;
    border-radius: 30px;
    font-family: 'Noto Serif TC', serif;
    font-style: italic;
    font-size: 0.85rem;
    transition: transform 0.4s ease;
    z-index: 100;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* INSTALL BANNER */
  #installBanner {
    display: none;
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #1e3a1e;
    color: #f4f7f2;
    border-radius: 40px;
    padding: 12px 20px 12px 16px;
    align-items: center;
    gap: 12px;
    z-index: 8888;
    box-shadow: 0 4px 20px rgba(30,58,30,0.4);
    white-space: nowrap;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.85rem;
  }

  #installBanner button {
    background: #5a8a5a;
    color: #f4f7f2;
    border: none;
    border-radius: 30px;
    padding: 7px 16px;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.82rem;
    cursor: pointer;
  }

  #installBanner .dismiss {
    background: transparent;
    color: #c2d4bc;
    padding: 4px 6px;
    font-size: 1rem;
  }

  /* MOBILE */
  @media (max-width: 600px) {
    body { padding: 16px 8px 60px; }
    .journal-content { padding: 32px 20px 32px 44px; }
    .journal::after { left: 34px; }
    .journal-header h1 { font-size: 1.8rem; }
    .photo-grid { grid-template-columns: repeat(2, 1fr); }
    .mood-tracker { gap: 6px; }
    .mood-btn { padding: 7px 12px; font-size: 0.8rem; }
    .weather-btn { padding: 5px 10px; font-size: 0.75rem; }
    .save-btn, .clear-btn { padding: 10px 16px; font-size: 0.82rem; }
  }
</style>
</head>
<body>

<div class="journal">
  <div class="journal-content">

    <div class="journal-header">
      <div class="subtitle">Personal Journal</div>
      <h1>The Soft Hours</h1>
      <div class="date-row">
        <div class="date-field">
          <label>Date:</label>
          <input type="date" id="entryDate">
        </div>
        <div class="date-field weather-field">
          <label>Weather:</label>
          <div class="weather-options">
            <button class="weather-btn" data-weather="sunny">☀️ Sunny</button>
            <button class="weather-btn" data-weather="cloudy">☁️ Cloudy</button>
            <button class="weather-btn" data-weather="rainy">🌧 Rainy</button>
            <button class="weather-btn" data-weather="stormy">⛈ Stormy</button>
            <button class="weather-btn" data-weather="snowy">❄️ Snowy</button>
            <button class="weather-btn" data-weather="windy">🌬 Windy</button>
            <button class="weather-btn" data-weather="foggy">🌫 Foggy</button>
            <button class="weather-btn" data-weather="partly cloudy">⛅ Partly Cloudy</button>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">How I'm Feeling</div>
      <div class="mood-tracker">
        <button class="mood-btn" data-mood="joyful">😊 Joyful</button>
        <button class="mood-btn" data-mood="calm">🌿 Calm</button>
        <button class="mood-btn" data-mood="grateful">🌸 Grateful</button>
        <button class="mood-btn" data-mood="anxious">🌧 Anxious</button>
        <button class="mood-btn" data-mood="tired">🍂 Tired</button>
        <button class="mood-btn" data-mood="excited">✨ Excited</button>
        <button class="mood-btn" data-mood="sad">💧 Sad</button>
        <button class="mood-btn" data-mood="loved">🧡 Loved</button>
      </div>
      <textarea class="mood-note" rows="2" placeholder="A little more about how I feel today…"></textarea>
    </div>

    <div class="section">
      <div class="section-title">Today's Story</div>
      <textarea class="writing-area" placeholder="Begin writing here… What happened today? What's on your mind?"></textarea>
    </div>

    <div class="section">
      <div class="section-title">Gratitude</div>
      <div class="gratitude-list">
        <div class="gratitude-item"><span class="gratitude-num">I.</span><input type="text" placeholder="I am grateful for…"></div>
        <div class="gratitude-item"><span class="gratitude-num">II.</span><input type="text" placeholder="I am grateful for…"></div>
        <div class="gratitude-item"><span class="gratitude-num">III.</span><input type="text" placeholder="I am grateful for…"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Memories & Photos</div>
      <div class="photo-grid">
        <div class="photo-slot" id="slot0"><div class="placeholder-icon">📷</div><div class="placeholder-text">Add photo</div><input type="file" accept="image/*" onchange="loadPhoto(this,0)"></div>
        <div class="photo-slot" id="slot1"><div class="placeholder-icon">📷</div><div class="placeholder-text">Add photo</div><input type="file" accept="image/*" onchange="loadPhoto(this,1)"></div>
        <div class="photo-slot" id="slot2"><div class="placeholder-icon">📷</div><div class="placeholder-text">Add photo</div><input type="file" accept="image/*" onchange="loadPhoto(this,2)"></div>
        <div class="photo-slot" id="slot3"><div class="placeholder-icon">📷</div><div class="placeholder-text">Add photo</div><input type="file" accept="image/*" onchange="loadPhoto(this,3)"></div>
        <div class="photo-slot" id="slot4"><div class="placeholder-icon">📷</div><div class="placeholder-text">Add photo</div><input type="file" accept="image/*" onchange="loadPhoto(this,4)"></div>
        <div class="photo-slot" id="slot5"><div class="placeholder-icon">📷</div><div class="placeholder-text">Add photo</div><input type="file" accept="image/*" onchange="loadPhoto(this,5)"></div>
      </div>
      <div class="photo-caption-area">
        <input type="text" placeholder="A caption for these moments…">
      </div>
    </div>

    <div class="journal-footer">
      <button class="clear-btn" onclick="clearEntry()">Start Fresh</button>
      <span class="page-num">— 🌿 —</span>
      <button class="save-btn" id="saveBtn" onclick="saveEntry()">Save Entry 🕊</button>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<div id="installBanner">
  📲 Add to your home screen
  <button onclick="installApp()">Install</button>
  <button class="dismiss" onclick="this.parentElement.style.display='none'">✕</button>
</div>

<script>
  // Set today's date
  document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];

  const photoData = {};

  // Weather buttons (multi-select)
  document.querySelectorAll('.weather-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
    });
  });

  // Mood buttons (multi-select)
  document.querySelectorAll('.mood-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
    });
  });

  // Photo loader
  function loadPhoto(input, i) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const slot = document.getElementById('slot' + i);
      slot.innerHTML = `<img src="${e.target.result}" alt="memory"><input type="file" accept="image/*" onchange="loadPhoto(this,${i})">`;
      photoData[i] = { dataUrl: e.target.result, type: file.type };
    };
    reader.readAsDataURL(file);
  }

  // Save as Word doc
  function saveEntry() {
    const btn = document.getElementById('saveBtn');
    btn.textContent = 'Saving…';
    btn.disabled = true;

    try {
      const date = document.getElementById('entryDate').value;
      const weather = [...document.querySelectorAll('.weather-btn.active')].map(b => b.dataset.weather).join(', ') || '—';
      const mood = [...document.querySelectorAll('.mood-btn.active')].map(b => b.dataset.mood).join(', ') || '—';
      const moodNote = document.querySelector('.mood-note').value.trim();
      const story = document.querySelector('.writing-area').value.trim();
      const gratitude = [...document.querySelectorAll('.gratitude-item input')].map(i => i.value.trim());
      const photoCaption = document.querySelector('.photo-caption-area input').value.trim();

      let photoHtml = '';
      for (let i = 0; i < 6; i++) {
        if (photoData[i]) {
          photoHtml += `<img src="${photoData[i].dataUrl}" style="width:160px;height:160px;object-fit:cover;margin:6px;border-radius:4px;">`;
        }
      }

      const storyHtml = story
        ? story.split('\n').map(l => `<p style="margin:0 0 10px;line-height:1.9;">${l || '&nbsp;'}</p>`).join('')
        : '<p style="color:#aaa;">—</p>';

      const gratHtml = gratitude.map((g, i) =>
        `<p style="margin:0 0 10px;"><span style="color:#5a8a5a;font-weight:bold;">${['I.','II.','III.'][i]}</span> &nbsp;${g || '—'}</p>`
      ).join('');

      const doc = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
  body { font-family: 'Noto Serif TC', Georgia, serif; max-width: 680px; margin: 60px auto; color: #1a2e1a; padding: 40px; }
  h1 { font-size: 2.2em; font-weight: 400; text-align: center; color: #1e3a1e; margin-bottom: 6px; }
  .meta { text-align: center; color: #5a8a5a; font-style: italic; margin-bottom: 28px; }
  hr { border: none; border-bottom: 1px solid #c2d4bc; margin: 22px 0; }
  .label { font-size: 0.75em; letter-spacing: 0.15em; text-transform: uppercase; color: #5a8a5a; font-weight: bold; margin-bottom: 10px; }
  .footer { text-align: center; color: #c2d4bc; margin-top: 40px; font-size: 1.2em; }
</style></head><body>
<h1>The Soft Hours</h1>
<p class="meta">${date} &nbsp;·&nbsp; ${weather}</p>
<hr>
<div class="label">How I'm Feeling</div>
<p style="font-weight:bold;margin:0 0 6px;">${mood}</p>
${moodNote ? `<p style="font-style:italic;color:#3a5e3a;margin:0 0 8px;">${moodNote}</p>` : ''}
<hr>
<div class="label">Today's Story</div>
${storyHtml}
<hr>
<div class="label">Gratitude</div>
${gratHtml}
${photoHtml || photoCaption ? `<hr><div class="label">Memories & Photos</div>${photoHtml}${photoCaption ? `<p style="font-style:italic;color:#3a5e3a;font-size:0.85em;margin-top:8px;">${photoCaption}</p>` : ''}` : ''}
<hr><div class="footer">✦ &nbsp; ✦ &nbsp; ✦</div>
</body></html>`;

      const blob = new Blob([doc], { type: 'application/msword' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `the-soft-hours-${date || 'entry'}.doc`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('Entry saved as Word document 📄');

    } catch(err) {
      showToast('⚠️ Error: ' + err.message);
    } finally {
      btn.textContent = 'Save Entry 🕊';
      btn.disabled = false;
    }
  }

  // Clear form
  function clearEntry() {
    if (!confirm('Start a fresh entry? This will clear the form.')) return;
    document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
    document.querySelectorAll('.weather-btn, .mood-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.mood-note').value = '';
    document.querySelector('.writing-area').value = '';
    document.querySelectorAll('.gratitude-item input').forEach(i => i.value = '');
    document.querySelector('.photo-caption-area input').value = '';
    Object.keys(photoData).forEach(k => delete photoData[k]);
    [0,1,2,3,4,5].forEach(i => {
      document.getElementById('slot'+i).innerHTML =
        `<div class="placeholder-icon">📷</div><div class="placeholder-text">Add photo</div><input type="file" accept="image/*" onchange="loadPhoto(this,${i})">`;
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // PWA install prompt
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').style.display = 'flex';
  });

  function installApp() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        document.getElementById('installBanner').style.display = 'none';
      });
    }
  }

  window.addEventListener('appinstalled', () => {
    document.getElementById('installBanner').style.display = 'none';
  });

  // Service worker
  if ('serviceWorker' in navigator) {
    const sw = `
      const CACHE = 'soft-hours-v1';
      self.addEventListener('install', e => self.skipWaiting());
      self.addEventListener('activate', e => self.clients.claim());
      self.addEventListener('fetch', e => {
        e.respondWith(caches.open(CACHE).then(c =>
          c.match(e.request).then(r => r || fetch(e.request).then(res => {
            c.put(e.request, res.clone()); return res;
          }).catch(() => r))
        ));
      });
    `;
    navigator.serviceWorker.register(
      URL.createObjectURL(new Blob([sw], {type:'application/javascript'}))
    ).catch(() => {});
  }
</script>
</body>
</html>
